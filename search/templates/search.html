<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サークル検索</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<h1>サークル検索</h1>

<form method="get">
    <input type="text" name="q" value="{{ query }}" placeholder="検索ワードを入力" style="width: 300px;">
    <button type="submit">検索</button>
</form>

{% if results %}
    <h2>検索結果</h2>
    {% for score, circle in results %}
        <div class="card">
            <h3>{{ circle.name }}</h3>
            <p>{{ circle.description }}</p>
            <p><strong>タグ:</strong> {{ circle.tags }}</p>
        </div>
    {% endfor %}
{% endif %}

</body>
</html>
